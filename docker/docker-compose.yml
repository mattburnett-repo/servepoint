################################################################################
# ServePoint Docker Compose Stack
# Application: Adobe ColdFusion 2025 + PostgreSQL
# This stack runs the app container built from ./docker/Dockerfile
# alongside a PostgreSQL database for local dev / monolithic deployments.
################################################################################

# docker compose --env-file .env -f docker/docker-compose.yml up

name: servepoint
services:
  db:
    container_name: servepoint_db
    image: postgres:16
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      # Expose Postgres to the host (optional, useful for psql/GUI tools)
      - "5432:5432"
    volumes:
      # Persist database data on the host
      - ../.db/postgres/data:/var/lib/postgresql/data

  app:
    container_name: servepoint_app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    depends_on:
      - db
    env_file:
      - ../.env
    environment:
      # Safety net. Override host so the app talks to the db service, not localhost
      DB_HOST: db
    ports:
      - "8080:8080"
